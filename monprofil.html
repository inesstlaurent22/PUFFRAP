<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil</title>

<link rel="stylesheet" href="monprofil.css">

</head>

<body>

  <button id="backMenu">← Retour menu</button>

  <div id="loader">Chargement...</div>

<div class="layout">

  <!-- MENU -->
  <aside class="sidebar">
    <button class="active">Mon compte</button>
    <button>Réservations</button>
    <button>Favoris</button>
    <button id="logoutBtn">Déconnexion</button>
  </aside>

  <!-- CONTENU -->
  <main class="content">

    <h1>Mon profil</h1>

    <!-- TOP -->
    <section class="top-section">

      <div class="infos">
        <input id="nom" type="text" placeholder="Nom">
        <input id="prenom" type="text" placeholder="Prénom">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Nouveau mot de passe">
        <input id="metier" type="text" placeholder="Métier">
      </div>

      <div class="photo-section">
        <img id="profilePreview" src="https://via.placeholder.com/150">
        <input type="file" id="profileImage" accept="image/*" hidden>
        <button id="uploadBtn" type="button">Télécharger</button>
      </div>

    </section>

    <!-- LIENS -->
    <section class="links">
      <input id="instagram" placeholder="Instagram">
      <input id="portfolio" placeholder="Portfolio">
      <input id="tiktok" placeholder="TikTok">
    </section>

    <!-- MEDIAS -->
    <section class="media-section">
      <input type="file" id="mediaInput" multiple accept="audio/*,video/*">
      <div id="mediaPreview"></div>
    </section>

    <!-- PRODUITS -->
    <section class="products">
      <h2>Produits</h2>
      <div id="productsList"></div>
      <button id="addProduct" type="button">+ Ajouter</button>
    </section>

    <button id="saveProfile" class="save" type="button">
      Enregistrer
    </button>

  </main>

</div>

<!-- ✅ SCRIPT MODULE -->
<script type="module" src="monprofil.js"></script>

</body>
</html>
