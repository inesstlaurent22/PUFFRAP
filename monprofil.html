<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil</title>

  <link rel="stylesheet" href="monprofil.css">

</head>

<body>

<div class="container">

  <h1>Mon Profil</h1>

  <!-- PHOTO -->
  <div class="section">
    <h2>Photo de profil</h2>

    <img id="profilePreview" src="https://via.placeholder.com/100" alt="Photo" class="profile-pic">

    <input type="file" id="profileImage" accept="image/*">
  </div>

  <!-- INFOS -->
  <div class="section">
    <h2>Informations</h2>

    <input type="text" id="nom" placeholder="Nom">
    <input type="text" id="prenom" placeholder="Prénom">
    <input type="text" id="username" placeholder="Identifiant">

    <input type="email" id="email" placeholder="Email">

    <div class="inline">
      <input type="password" id="password" placeholder="Nouveau mot de passe">
      <button type="button" id="changePasswordBtn">Modifier</button>
    </div>

    <input type="text" id="metier" placeholder="Métier">

    <button type="button" id="changeEmailBtn">
      Modifier email
    </button>

  </div>

  <!-- LIENS -->
  <div class="section">
    <h2>Liens</h2>

    <input type="url" id="instagram" placeholder="Lien Instagram">
    <input type="url" id="portfolio" placeholder="Lien Portfolio">
    <input type="url" id="tiktok" placeholder="Lien TikTok">

  </div>

  <!-- MEDIAS -->
  <div class="section">
    <h2>Médias (max 5)</h2>

    <input 
      type="file" 
      id="mediaInput" 
      multiple 
      accept=".mp3,.mp4,.mov"
    >

    <div id="mediaPreview"></div>
  </div>

  <!-- PRODUITS -->
  <div class="section">
    <h2>Produits</h2>

    <div id="productsList"></div>

    <button type="button" id="addProduct">
      + Ajouter un produit
    </button>

  </div>

  <!-- SAVE -->
  <button type="button" id="saveProfile" class="save-btn">
    Enregistrer
  </button>

</div>

<!-- ⚠️ IMPORTANT : module pour Firebase -->
<script type="module" src="monprofil.js"></script>

</body>
</html>
