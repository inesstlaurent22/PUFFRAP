<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil</title>

<link rel="stylesheet" href="monprofil.css">

</head>

<body>

<div class="layout">

  <!-- MENU -->
  <div class="sidebar">
    <button class="active">Mon compte</button>
    <button>Réservations</button>
    <button>Favoris</button>
    <button id="logoutBtn">Déconnexion</button>
  </div>

  <!-- CONTENU -->
  <div class="content">

    <h1>Mon profil</h1>

    <!-- TOP -->
    <div class="top-section">

      <!-- INFOS -->
      <div class="infos">

        <input id="nom" placeholder="Nom">
        <input id="prenom" placeholder="Prénom">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Nouveau mot de passe">
        <input id="metier" placeholder="Métier">

      </div>

      <!-- PHOTO -->
      <div class="photo-section">

        <img id="profilePreview" src="https://via.placeholder.com/150">

        <input type="file" id="profileImage" hidden>
        <button id="uploadBtn">Télécharger</button>

      </div>

    </div>

    <!-- LIENS -->
    <div class="links">
      <input id="instagram" placeholder="Instagram">
      <input id="portfolio" placeholder="Portfolio">
      <input id="tiktok" placeholder="TikTok">
    </div>

    <!-- MEDIAS -->
    <div class="media-section">
      <input type="file" id="mediaInput" multiple accept=".mp3,.mp4,.mov">
      <div id="mediaPreview"></div>
    </div>

    <!-- PRODUITS -->
    <div class="products">
      <h2>Produits</h2>

      <div id="productsList"></div>

      <button id="addProduct">+ Ajouter</button>
    </div>

    <!-- SAVE -->
    <button id="saveProfile" class="save">Enregistrer</button>

  </div>

</div>

<script src="monprofil.js"></script>

</body>
</html>
