<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil</title>

<link rel="stylesheet" href="monprofil.css">

</head>

<body>

<div class="layout">

  <!-- MENU -->
  <aside class="sidebar">
    <button class="active">Mon compte</button>
    <button>Réservations</button>
    <button>Favoris</button>
    <button id="logoutBtn">Déconnexion</button>
  </aside>

  <!-- CONTENU -->
  <main class="content">

    <button id="backMenu" class="back-btn">← Retour au menu</button>

    <h1>Mon profil</h1>

    <!-- TOP -->
    <section class="top-section">

      <!-- INFOS -->
      <div class="infos">

        <input id="nom" type="text" placeholder="Nom" autocomplete="family-name">
        <input id="prenom" type="text" placeholder="Prénom" autocomplete="given-name">
        <input id="email" type="email" placeholder="Email" autocomplete="email">

        <!-- ⚠️ Password séparé (sécurité) -->
        <input id="password" type="password" placeholder="Nouveau mot de passe" autocomplete="new-password">

        <input id="metier" type="text" placeholder="Métier">

      </div>

      <!-- PHOTO -->
      <div class="photo-section">

        <img 
          id="profilePreview" 
          src="https://via.placeholder.com/150" 
          alt="Photo de profil"
        >

        <input type="file" id="profileImage" accept="image/*" hidden>

        <button id="uploadBtn" type="button">
          Télécharger une photo
        </button>

      </div>

    </section>

    <!-- LIENS -->
    <section class="links">
      <input id="instagram" type="url" placeholder="Lien Instagram">
      <input id="portfolio" type="url" placeholder="Site / Portfolio">
      <input id="tiktok" type="url" placeholder="Lien TikTok">
    </section>

    <!-- MEDIAS -->
    <section class="media-section">

      <label for="mediaInput">Ajouter des médias (max 5)</label>

      <input 
        type="file" 
        id="mediaInput" 
        multiple 
        accept="audio/*,video/*"
      >

      <div id="mediaPreview"></div>

    </section>

    <!-- PRODUITS -->
    <section class="products">

      <h2>Produits / Services</h2>

      <div id="productsList"></div>

      <button id="addProduct" type="button">
        + Ajouter un produit
      </button>

    </section>

    <!-- SAVE -->
    <button id="saveProfile" class="save" type="button">
      Enregistrer
    </button>

  </main>

</div>

<!-- ⚠️ IMPORTANT : module pour Firebase -->
<script type="module" src="monprofil.js"></script>

</body>
</html>
