<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Artiste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="artiste.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ================= HEADER COVER ================= -->
  <div class="cover">
    <img id="coverImage" src="" alt="Cover artiste">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  </div>

  <!-- ================= PROFIL ================= -->
  <div class="profile">

    <img id="profileImage" class="avatar" src="" alt="Photo artiste">

    <h1 id="displayStageName"></h1>
    <p id="displayFullName"></p>

    <!-- SOCIALS -->
    <div class="socials">
      <a id="linkInstagram" target="_blank">Instagram</a>
      <a id="linkTiktok" target="_blank">TikTok</a>
      <a id="linkPortfolio" target="_blank">Portfolio</a>
    </div>

  </div>

  <!-- ================= CREATIONS ================= -->
  <div class="section">
    <h2>🎧 Créations</h2>
    <div id="creationsList"></div>
  </div>

  <!-- ================= SERVICES ================= -->
  <div class="section">
    <h2>💼 Services</h2>
    <div id="servicesList"></div>
  </div>

  <!-- ================= CTA ================= -->
  <button id="bookBtn">Réserver</button>

  <!-- JS -->
  <script type="module" src="artiste.js"></script>

</body>
</html>
