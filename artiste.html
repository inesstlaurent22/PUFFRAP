<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artiste</title>

<link rel="stylesheet" href="artiste.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="avatar"></div>

    <div class="header-info">
      <h1 id="name">Username</h1>

      <div class="rating">
        ⭐⭐⭐⭐☆ <span id="note">4.8</span>
      </div>

      <div class="tags">
        <span>DJ</span>
        <span>Chant</span>
        <span>Mixage</span>
        <span>Manager</span>
      </div>
    </div>

  </div>

  <!-- SERVICES -->
  <div class="services">

    <div class="service">
      🎵
      <p>Portfolio</p>
      <small>Musique 1 💿</small>
      <small>Musique 2 💿</small>
    </div>

    <div class="service">
      🎚️
      <p>Portfolio</p>
      <small>Son 1 🎛️</small>
      <small>Son 2 🎛️</small>
    </div>

    <div class="service">
      💬
      <p>Portfolio</p>
      <small>Projet 1 📱</small>
      <small>Projet 2 📱</small>
    </div>

  </div>

  <!-- CALENDAR -->
  <div class="calendar-box">

    <h2>Calendar</h2>

    <div class="calendar" id="calendar"></div>

  </div>

  <!-- CTA -->
  <button class="cta">Demander un rendez-vous</button>

</div>

<script src="artiste.js"></script>

</body>
</html>
