<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Artiste</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="artiste.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- 🔙 BACK -->
  <button class="back-btn" onclick="window.location.href='index.html'">
    ← Retour
  </button>

  <div class="artist-container">
<!-- ================= IMAGE ================= -->
<div class="image-container">
  <img id="profileImage" src="" alt="Photo artiste">
  <input type="file" id="uploadImage" class="edit-only">
</div>

<!-- ================= INFOS ================= -->
<div class="info-section">

  <!-- 🎤 NOM D’ARTISTE -->
  <input id="artistName" placeholder="Nom d'artiste">

  <!-- 👤 NOM / PRÉNOM -->
  <div class="row">
    <input type="text" id="artistFirstName" placeholder="Prénom">
    <input type="text" id="artistLastName" placeholder="Nom">
  </div>

  <!-- 📍 ADRESSE -->
  <input id="artistAddress" placeholder="Adresse">

  <!-- 🌐 RÉSEAUX -->
  <input id="artistInstagram" placeholder="Instagram (https://...)">
  <input id="artistTiktok" placeholder="TikTok (https://...)">
  <input id="artistPortfolio" placeholder="Portfolio (https://...)">

</div>

<!-- ================= SERVICES ================= -->
<div class="section">
  <h2>Services</h2>

  <div id="servicesList"></div>

  <button id="addService" class="edit-only">+ Ajouter</button>
</div>

<!-- ================= CREATIONS ================= -->
<div class="section">
  <h2>Créations</h2>

  <div id="creationsList"></div>

  <input 
    type="file" 
    id="creationFile" 
    class="edit-only" 
    accept=".mp3,.mp4,.mov"
  >

  <button id="addCreation" class="edit-only">
    + Ajouter création
  </button>
</div>

<!-- ================= CTA CLIENT ================= -->
<button id="bookBtn" class="client-only">
  Réserver
</button>

<!-- ================= SAVE ================= -->
<button id="saveProfile" class="btn-save edit-only">
  Sauvegarder
</button>

  </div>

  <script type="module" src="artiste.js"></script>

</body>
</html>
