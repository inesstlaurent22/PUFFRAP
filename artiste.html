<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Artiste</title>

  <link rel="stylesheet" href="artiste.css">

  <!-- FONT PREMIUM -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- 🔥 NAV -->
  <div class="top-bar">
    <button id="backBtn">← Retour</button>
  </div>

  <div class="artist-container">

    <!-- IMAGE -->
    <div class="image-container">
      <img id="profileImage" src="" />
    </div>

    <!-- INFOS -->
    <div class="info-section">

      <input id="username" placeholder="Nom artiste" />
      
      <div class="row">
        <input id="artistFirstName" placeholder="Prénom" />
        <input id="artistLastName" placeholder="Nom" />
      </div>

      <input id="artistAddress" placeholder="Adresse" />

    </div>

    <!-- SERVICES -->
    <div class="section">
      <h2>Services</h2>
      <div id="servicesList"></div>
    </div>

    <!-- CREATIONS -->
    <div class="section">
      <h2>Créations</h2>
      <div id="creationsList"></div>
    </div>

    <!-- CTA -->
    <button id="saveProfile" class="btn-save">
      Sauvegarder
    </button>

  </div>

  <script type="module" src="artiste.js"></script>

</body>
</html>
