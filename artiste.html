<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artiste</title>

<link rel="stylesheet" href="artiste.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <button class="back">← Back</button>

    <div class="profile">
      <div class="avatar"></div>

      <div class="info">
        <h1>Username</h1>

        <div class="rating">
          ⭐⭐⭐⭐☆ <span>4,8</span>
        </div>

        <div class="tags">
          <span>DJ</span>
          <span>DJ</span>
          <span>DJ</span>
          <span>DJ</span>
        </div>
      </div>
    </div>

  </div>

  <!-- SLIDER -->
  <div class="slider">
    <div class="slider-track">

      <div class="card">Musique<br>Son1<br>Son2</div>
      <div class="card">Portfolio 1</div>
      <div class="card">Portfolio 2</div>
      <div class="card">Mixage</div>
      <div class="card">Community</div>

    </div>
  </div>

  <!-- CALENDAR -->
  <div class="calendar-box">
    <div id="calendar"></div>
  </div>

</div>

<script src="artiste.js"></script>

</body>
</html>
