<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Puff Map</title>

<!-- CSS -->
<link rel="stylesheet" href="application.css">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- CLUSTER -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

</head>

<body>

<!-- ================= MAP ================= -->
<div id="map"></div>


<!-- ================= TOPBAR ================= -->
<div class="topbar">

  <!-- INSCRIPTION -->
  <button id="signupBtn" type="button">Inscription</button>

  <!-- CONNEXION -->
  <button id="loginBtn" type="button">Connexion</button>

  <!-- DROPDOWN INSCRIPTION -->
  <div id="dropdown" class="dropdown hidden">
    <button type="button" onclick="selectUser('client')">Client</button>
    <button type="button">Artiste</button>
  </div>

  <!-- PROFIL -->
  <div id="profile" class="hidden">
    <span id="profileName"></span>

    <!-- DROPDOWN PROFIL -->
    <div id="profileDropdown" class="dropdown hidden">
      <button type="button" onclick="openAccount()">Mon compte</button>
      <button type="button" onclick="openReservations()">Mes réservations</button>
      <button type="button" onclick="openFavoris()">Mes favoris</button>
      <button type="button" onclick="logout()">Déconnexion</button>
    </div>
  </div>

</div>


<!-- ================= POPUP INSCRIPTION ================= -->
<div id="popup" class="popup hidden">
  <div class="popup-overlay" onclick="closePopup()"></div>

  <div class="popup-content">

    <button class="close-btn" onclick="closePopup()">✕</button>

    <h2>Créer un compte</h2>

    <input id="username" type="text" placeholder="Identifiant">
    <input id="nom" type="text" placeholder="Nom">
    <input id="prenom" type="text" placeholder="Prénom">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button id="signupSubmit" type="button">S’inscrire</button>

  </div>
</div>


<!-- ================= POPUP CONNEXION ================= -->
<div id="loginPopup" class="popup hidden">
  <div class="popup-overlay" onclick="closePopup()"></div>

  <div class="popup-content">

    <button class="close-btn" onclick="closePopup()">✕</button>

    <h2>Connexion</h2>

    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Mot de passe">

    <button id="loginSubmit" type="button">Se connecter</button>

  </div>
</div>


<!-- ================= GPS BUTTON ================= -->
<button id="locateBtn" type="button">📍</button>


<!-- ================= SCRIPTS ================= -->

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- CLUSTER -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- APP -->
<script type="module" src="application.js"></script>


<!-- ================= FIX FUNCTIONS ================= -->
<script>
  // évite erreurs JS si fonctions non définies
  window.openAccount = () => alert("Mon compte");
  window.openReservations = () => alert("Mes réservations");
  window.openFavoris = () => alert("Mes favoris");
</script>

</body>
</html>
