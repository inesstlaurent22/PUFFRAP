<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Puff Map</title>

<link rel="stylesheet" href="application.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOP RIGHT MENU -->
<div class="topbar">

  <button id="signupBtn">Inscription</button>

  <div id="dropdown" class="dropdown hidden">
    <button onclick="selectUser('client')">Client</button>
    <button>Artiste</button>
  </div>

  <div id="profile" class="hidden">
    <span id="profileName"></span>
  </div>

</div>

<!-- POPUP INSCRIPTION -->
<div id="popup" class="popup hidden">
  <div class="popup-content">

    <h2>Créer un compte</h2>

    <input id="username" placeholder="Identifiant">
    <input id="nom" placeholder="Nom">
    <input id="prenom" placeholder="Prénom">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="signup()">S’inscrire</button>

  </div>
</div>

<!-- GPS BUTTON -->
<button id="locateBtn">📍</button>

<script src="application.js"></script>

</body>
</html>
