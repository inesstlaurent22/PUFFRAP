<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Puff Map</title>

<link rel="stylesheet" href="application.css">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- CLUSTER -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

</head>

<body>

<!-- ================= MAP ================= -->
<div id="map"></div>


<!-- ================= TOPBAR ================= -->
<div class="topbar">

  <div class="signup-wrapper">
    <button id="signupBtn">Inscription</button>

    <div id="dropdown" class="dropdown hidden">
      <button onclick="selectUser('client')">Client</button>
      <button onclick="selectUser('artist')">Artiste</button>
    </div>
  </div>

  <button id="loginBtn">Connexion</button>

  <div id="profile" class="profile-wrapper hidden">
    <span id="profileName"></span>

    <div id="profileDropdown" class="dropdown hidden">
      <button onclick="openAccount()">Mon compte</button>
      <button onclick="openReservations()">Mes réservations</button>
      <button onclick="openFavoris()">Mes favoris</button>
      <button onclick="logout()">Déconnexion</button>
    </div>
  </div>

</div>


<!-- ================= POPUP CLIENT ================= -->
<div id="popup" class="popup hidden">

  <div class="popup-overlay"></div>

  <div class="popup-content">
    <h2>Créer un compte client</h2>

    <input id="username" placeholder="Identifiant">
    <input id="nom" placeholder="Nom">
    <input id="prenom" placeholder="Prénom">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button id="signupSubmit" type="button">Créer mon compte</button>
  </div>

</div>


<!-- ================= POPUP ARTISTE ================= -->
<div id="artistPopup" class="popup hidden">

  <div class="popup-overlay"></div>

  <div class="popup-content">

    <h2>Créer un profil artiste</h2>

    <input id="artistNom" placeholder="Nom">
    <input id="artistPrenom" placeholder="Prénom">
    <input id="artistEmail" type="email" placeholder="Email">
    <input id="artistPassword" type="password" placeholder="Mot de passe">

    <!-- LOCALISATION -->
    <div class="location-wrapper">

      <div class="location-input">
        <input 
          id="artistArr"
          type="text"
          placeholder="Ville ou code postal"
          autocomplete="off"
        >
        <button id="geoBtn" type="button">📍</button>
      </div>

      <div id="arrSuggestions" class="dropdown hidden"></div>

    </div>

    <!-- PRODUITS -->
    <select id="artistProduits">
      <option value="">Choisir un domaine</option>
      <option>Chant</option>
      <option>Mixage</option>
      <option>Community Manager</option>
      <option>Manager</option>
      <option>Vidéaste</option>
      <option>Autre</option>
    </select>

    <!-- MEDIA -->
    <input 
      id="artistMedia" 
      type="file" 
      accept=".mp3,.mp4,.mov"
    >

    <button id="createArtistBtn" type="button">
      Créer mon profil
    </button>

  </div>
</div>


<!-- ================= POPUP LOGIN ================= -->
<div id="loginPopup" class="popup hidden">

  <div class="popup-overlay"></div>

  <div class="popup-content">

    <h2>Connexion</h2>

    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Mot de passe">

    <button id="loginSubmit" type="button">Se connecter</button>

  </div>
</div>


<!-- ================= GPS BUTTON MAP ================= -->
<button id="locateBtn">📍</button>


<!-- ================= SCRIPTS ================= -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script type="module" src="application.js"></script>

<script>
window.openAccount = () => alert("Mon compte");
window.openReservations = () => alert("Mes réservations");
window.openFavoris = () => alert("Mes favoris");
</script>

</body>
</html>
