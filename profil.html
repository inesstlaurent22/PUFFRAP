<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Mon Profil</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="profil.css">

  <!-- FONT PREMIUM -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
</head>

<body>

  <!-- 🔙 BACK -->
  <button class="back-btn" onclick="window.location.href='index.html'">
    ← Retour
  </button>

  <!-- ================= CONTAINER ================= -->
  <div class="profile-container">

    <h1>Mon profil</h1>

    <!-- ================= PHOTO ================= -->
    <div class="profile-photo">
      <label for="uploadImage">
        <img id="profileImage" src="https://via.placeholder.com/100" />
      </label>
      <input type="file" id="uploadImage" accept="image/*">
    </div>

    <!-- ================= INFOS ================= -->

    <input type="text" id="artistFirstName" placeholder="Prénom">
    <input type="text" id="artistLastName" placeholder="Nom">

    <input type="text" id="username" placeholder="Nom d’artiste">

    <input type="email" id="artistEmail" placeholder="Email" disabled>

    <input type="text" id="artistAddress" placeholder="Adresse">

    <!-- ================= ACCOUNT ================= -->

    <div class="account-section">
      <button id="changeEmail">Changer email</button>
      <button id="changePassword">Changer mot de passe</button>
    </div>

    <!-- ================= SAVE ================= -->

    <button id="saveProfile" class="btn-save">
      Sauvegarder mon profil
    </button>

  </div>

  <!-- ================= SCRIPT ================= -->
  <script type="module" src="profil.js"></script>

</body>

</html>
