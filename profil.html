<div class="profile-container">

  <h1>Mon profil</h1>

  <!-- PHOTO -->
  <div class="profile-photo">
    <img id="profileImage" src="" />
    <input type="file" id="uploadImage" />
  </div>

  <!-- NOM -->
  <input type="text" id="username" placeholder="Nom artiste" />

  <!-- EMAIL -->
  <div class="account-section">
    <button id="changeEmail">Changer email</button>
    <button id="changePassword">Changer mot de passe</button>
  </div>

  <!-- SERVICES -->
  <h2>Mes services</h2>

  <div id="servicesList"></div>

  <button id="addService">+ Ajouter un service</button>

  <!-- SAVE -->
  <button id="saveProfile" class="btn-save">
    Sauvegarder
  </button>

</div>
