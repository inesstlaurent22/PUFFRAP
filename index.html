<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PUFFRAP</title>

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- LEAFLET CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<!-- ================= MAP ================= -->
<div id="map"></div>
<div class="map-glow"></div>

<!-- ================= NAVBAR ================= -->
<header class="navbar">

  <h1 class="logo">PUFFRAP</h1>

  <div class="nav-buttons">

    <!-- LOGIN -->
    <button id="loginBtn" class="btn-outline">Connexion</button>

    <!-- SIGNUP -->
    <div class="dropdown">
      <button id="signupToggle" class="btn-gold">Inscription</button>

      <div id="dropdownMenu" class="dropdown-content">
        <button id="signupClient">Client</button>
        <button id="signupArtist">Artiste</button>
      </div>
    </div>

    <!-- USER MENU -->
    <div id="userMenu" class="user-menu" style="display:none;">

      <button id="userToggle" class="btn-gold">
        Mon compte
      </button>

      <div id="userDropdown" class="user-dropdown">
        <button onclick="location.href='profil.html'">Mon profil</button>
        <button>Mes réservations</button>
        <button>Mes favoris</button>
        <button id="logoutBtn">Déconnexion</button>
      </div>

    </div>

  </div>

</header>

<!-- ================= SEARCH ================= -->
<div class="search-box">

  <input type="text" id="searchInput" placeholder="Ville ou code postal..." />

  <!-- 🔥 IMPORTANT -->
  <div id="suggestions" class="suggestions-box"></div>

  <button id="searchBtn" class="btn-gold">Je cherche</button>

</div>

<!-- ================= LOGIN MODAL ================= -->
<div id="loginModal" class="modal">
  <div class="modal-content">

    <h2>Connexion</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Mot de passe">

    <button id="loginSubmit" class="btn-gold">Se connecter</button>

  </div>
</div>

<!-- ================= SIGNUP CLIENT ================= -->
<div id="signupClientModal" class="modal">
  <div class="modal-content">

    <h2>Inscription Client</h2>

    <input type="text" id="clientUsername" placeholder="Nom">
    <input type="email" id="clientEmail" placeholder="Email">
    <input type="password" id="clientPassword" placeholder="Mot de passe">

    <button id="createClient" class="btn-gold">Créer compte</button>

  </div>
</div>

<!-- ================= SIGNUP ARTIST ================= -->
<div id="signupArtistModal" class="modal">
  <div class="modal-content">

    <h2>Créer ton profil artiste</h2>

    <!-- PHOTO -->
    <label class="upload-box">
      <input type="file" id="artistImage" accept="image/*">
      <span>📸 Ajouter une photo</span>
    </label>

    <img id="previewImage" class="preview-img"/>

    <!-- NOM -->
    <input type="text" id="artistFirstName" placeholder="Prénom">
    <input type="text" id="artistLastName" placeholder="Nom">

    <!-- USERNAME -->
    <input type="text" id="artistUsername" placeholder="Nom d'artiste">

    <!-- EMAIL -->
    <input type="email" id="artistEmail" placeholder="Email">
    <input type="password" id="artistPassword" placeholder="Mot de passe">

    <!-- 🔥 ADRESSE AVEC AUTOCOMPLETE -->
    <div class="address-wrapper">

      <input type="text" id="artistAddress" placeholder="Adresse complète">

      <!-- 🔥 TRÈS IMPORTANT -->
      <div id="addressSuggestions" class="suggestions-box"></div>

    </div>

    <!-- COMPÉTENCES -->
    <label>Compétences</label>

    <div class="skills-container">
      <div class="skill">Beatmaker/Mix</div>
      <div class="skill">Chanteur/Chanteuse</div>
      <div class="skill">Vidéaste</div>
      <div class="skill">Producteur/rice</div>
      <div class="skill">Community Manager</div>
      <div class="skill">Comptable</div>
    </div>

    <label>Ajoute tes créations (max 5)</label>
<input type="file" id="artistFiles" multiple accept=".mp3,.mp4,.mov">

<div id="filePreview" style="margin-top:10px;"></div>

    <!-- SOCIALS -->
    <input type="text" id="artistInstagram" placeholder="Instagram (https://...)">
    <input type="text" id="artistTiktok" placeholder="TikTok (https://...)">
    <input type="text" id="artistPortfolio" placeholder="Portfolio (https://...)">

    <button id="createArtist" class="btn-green">Créer mon profil</button>

  </div>
</div>

<!-- ================= LEAFLET ================= -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ================= SCRIPT ================= -->
<script type="module" src="script.js"></script>

</body>
</html>
