<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <!-- VIEWPORT MOBILE APP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Puff News</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5a00">

  <!-- iOS APP MODE -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- APP CONTAINER -->
<div class="app">

  <!-- BACKGROUND -->
  <div class="background"></div>

  <!-- MENU -->
  <div class="menu">
    <button>APPLICATION</button>
    <button>SORTIES</button>
    <button>CONTACT</button>
  </div>

  <!-- SLIDER MUSIQUE -->
  <div class="slider" id="slider">

    <!-- ORANGE CLOUD EFFECT -->
    <div class="orange-blur"></div>

    <div class="slides">
  <img src="images/puffrap1.jpg" class="slide" alt="slide 1">
  <img src="images/puffrap2.jpg" class="slide" alt="slide 2">
  <img src="images/puffrap3.jpg" class="slide" alt="slide 3">
</div>

  </div>

  <!-- IMAGE PRINCIPALE -->
  <div class="hero">
    <img src="images/hero.jpg" alt="image principale">
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <img src="images/insta.png" alt="instagram">
    <img src="images/mail.png" alt="mail">
    <img src="images/tiktok.png" alt="tiktok">
    <p>@puffnews</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
