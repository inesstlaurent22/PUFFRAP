<!DOCTYPE html>
<html lang="fr">

</head>

<body>

<header class="navbar">

    <button id="signupBtn">Inscription</button>
  </div>
</header>

<section class="hero">

  </div>
</section>

  <!-- SECTION ARTISTES -->
<section class="artists-section">

  <div id="artistsContainer" class="grid"></div>
</section>

<script type="module" src="script.js"></script>

</body>
</html>
