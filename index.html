<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PUFFRAP</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- LEAFLET CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<!-- ================= MAP BACKGROUND ================= -->
<div id="map"></div>
<div class="map-glow"></div>

<!-- ================= NAVBAR ================= -->
<header class="navbar">

  <h1 class="logo">PUFFRAP</h1>

  <div class="nav-buttons">

    <!-- LOGIN -->
    <button id="loginBtn" class="btn-outline">Connexion</button>

    <!-- SIGNUP DROPDOWN -->
    <div class="dropdown">
      <button id="signupToggle" class="btn-gold">Inscription</button>

      <div id="dropdownMenu" class="dropdown-content">
        <button id="signupClient">Client</button>
        <button id="signupArtist">Artiste</button>
      </div>
    </div>

  </div>

</header>

<!-- ================= SEARCH BAR ================= -->
<div class="search-box">

  <input type="text" id="searchInput" placeholder="Ville ou code postal..." />

  <div id="suggestions" class="suggestions"></div>

  <button id="searchBtn" class="btn-gold">Je cherche</button>

</div>

<!-- ================= LOGIN MODAL ================= -->
<div id="loginModal" class="modal">
  <div class="modal-content">

    <h2>Connexion</h2>

    <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="new-password">

    <button id="loginSubmit" class="btn-gold">Se connecter</button>

  </div>
</div>

<!-- ================= SIGNUP CLIENT ================= -->
<div id="signupClientModal" class="modal">
  <div class="modal-content">

    <h2>Inscription Client</h2>

    <input type="text" id="clientUsername" placeholder="Nom">
    <input type="email" id="clientEmail" placeholder="Email" autocomplete="off">
    <input type="password" id="clientPassword" placeholder="Mot de passe" autocomplete="new-password">

    <button id="createClient" class="btn-gold">Créer compte</button>

  </div>
</div>

<!-- ================= SIGNUP ARTIST ================= -->
<div id="signupArtistModal" class="modal">
  <div class="modal-content">

    <h2>Inscription Artiste</h2>

    <input type="email" id="artistEmail" placeholder="Email">
    <input type="password" id="artistPassword" placeholder="Mot de passe">

    <input type="text" id="artistUsername" placeholder="Nom d'artiste">

    <!-- PHOTO -->
    <input type="file" id="artistImage" accept="image/*">

    <!-- SKILLS -->
    <label>Compétences :</label>
    <select id="artistSkills" multiple>
      <option>Beatmaker/Mix</option>
      <option>Chanteur/Chanteuse</option>
      <option>Vidéaste</option>
      <option>Producteur/rice</option>
      <option>Community Manager</option>
      <option>Comptable</option>
    </select>

    <!-- ADRESSE AUTO -->
    <input type="text" id="artistAddress" placeholder="Adresse ou code postal">
    <div id="addressSuggestions" class="suggestions"></div>

    <!-- LIENS -->
    <input type="text" id="artistInstagram" placeholder="Instagram (https://...)">
    <input type="text" id="artistTiktok" placeholder="TikTok (https://...)">
    <input type="text" id="artistPortfolio" placeholder="Portfolio (https://...)">

    <button id="createArtist" class="btn-gold">Créer mon profil</button>

  </div>
</div>

<!-- ================= LEAFLET JS (IMPORTANT ICI) ================= -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- SCRIPT -->
<script type="module" src="script.js"></script>

</body>
</html>
