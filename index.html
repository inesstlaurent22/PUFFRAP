<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puffrap</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrapper">

  <div class="content">

    <!-- TITLE -->
    <h1>PUFFRAP</h1>

    <!-- TEXT -->
    <p>
      PUFFRAP est une application qui
      permet de localiser les différents
      acteurs du secteur de la musique
      en quelques clics
    </p>

    <!-- BUTTONS -->
    <div class="buttons">
      <button onclick="goToApp()">APPLICATION</button>
      <button onclick="goToMagazine()">MAGAZINE</button>
    </div>

    <!-- SLIDER -->
    <div class="slider">

      <div class="slides">

        <img src="images/Puffrap1.JPG" class="slide">
        <img src="images/Puffrap3.JPG" class="slide">
        <img src="images/Puffrap4.JPG" class="slide">

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
