<!DOCTYPE html>
<html lang="fr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puff News</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND -->
<div class="background"></div>

<!-- MENU -->
<div class="menu">

  <button>SORTIES</button>
  <button>CONTACT</button>
</div>

<!-- SLIDER -->
<div class="slider" id="slider">
  <div class="slides">
    <img src="images/Puffrap1.JPG" class="slide active">
    <img src="images/Puffrap2.JPG" class="slide">
    <img src="images/Puffrap3.JPG" class="slide">
  </div>

  <!-- FLUID ORANGE -->
  <div class="orange-blur"></div>
</div>

<!-- HERO IMAGE -->
<div class="hero">
  <img src="images/hero.jpg">
</div>

<!-- FOOTER -->
<div class="footer">
  <img src="images/insta.png">
  <img src="images/mail.png">
  <img src="images/tiktok.png">
  <p>@puffnews</p>
</div>

<script src="script.js"></script>
</body>
</html>
